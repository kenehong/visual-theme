<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimbap — CSS Pixel Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    color: #5a4a3a;
    padding: 2rem;
    gap: 2.5rem;
  }
  .art-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }
  .pixel-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }
  .pixel-box {
    position: relative;
  }
  #main-canvas {
    width: 6px; height: 6px;
    position: absolute;
    top: 0; left: 0;
  }
  #large-canvas {
    width: 12px; height: 12px;
    position: absolute;
    top: 0; left: 0;
  }
  #small-canvas {
    width: 2px; height: 2px;
    position: absolute;
    top: 0; left: 0;
  }
  .size-label {
    font-size: 0.7rem;
    color: #9a8a7a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .sizes-row {
    display: flex;
    align-items: flex-end;
    gap: 3rem;
  }
  .label {
    text-align: center;
  }
  .label h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #3a2a1a;
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }
  .label p {
    font-size: 0.8rem;
    color: #8a7a6a;
    font-weight: 400;
  }
</style>
</head>
<body>

<div class="art-container">
  <!-- Main display: 1x (6px per pixel) = 288x288 -->
  <div class="pixel-wrap">
    <div class="pixel-box" style="width:288px;height:288px;">
      <div id="main-canvas"></div>
    </div>
  </div>

  <div class="label">
    <h1>Kimbap &mdash; CSS Pixel Art</h1>
    <p>Pure CSS, hand-crafted</p>
  </div>

  <!-- 2x and icon sizes -->
  <div class="sizes-row">
    <div class="pixel-wrap">
      <div class="pixel-box" style="width:576px;height:576px;">
        <div id="large-canvas"></div>
      </div>
      <span class="size-label">2&times; Detail</span>
    </div>
    <div class="pixel-wrap">
      <div class="pixel-box" style="width:96px;height:96px;">
        <div id="small-canvas"></div>
      </div>
      <span class="size-label">Icon</span>
    </div>
  </div>
</div>

<script>
// =============================================
// CSS Pixel Art — Kimbap Cross-Section
// 48x48 grid, rendered at multiple pixel sizes
// =============================================
const W = 48, H = 48;
const cx = 23.5, cy = 23.5;

function dist(x, y, ax, ay) {
  return Math.sqrt((x - ax) ** 2 + (y - ay) ** 2);
}

// --- Colors ---
const COL = {
  outline:     '#0E160C',
  seaweedHi:   '#3D5838', seaweedBase: '#2D4828', seaweedSh: '#1E3018',
  riceHi:      '#F8F2E8', riceBase:    '#F0E8D8', riceSh:    '#D8CDB8', riceMid: '#E8DCC8',
  riceSeed:    '#2A2520',
  sep:         '#3A3028',
  danHi:       '#F0D050', danBase:     '#E8C840', danSh:     '#D0B030',
  eggHi:       '#F0D880', eggBase:     '#E8D070', eggSh:     '#D0B850',
  hamHi:       '#D890A0', hamBase:     '#D08090', hamSh:     '#B06878',
  spiHi:       '#58B058', spiBase:     '#48A048', spiSh:     '#387838',
  carHi:       '#E08050', carBase:     '#D87040', carSh:     '#C06030',
  crbHi:       '#F0B890', crbBase:     '#E8A880', crbSh:     '#D09068',
  burHi:       '#9B7850', burBase:     '#8B6840', burSh:     '#6B5030',
};

// Shading: top-left highlight, bottom-right shadow
function shade3(px, py, ecx, ecy, hi, base, sh) {
  const dir = (px - ecx) + (py - ecy);
  if (dir < -1.2) return hi;
  if (dir > 1.2) return sh;
  return base;
}

const grid = Array.from({ length: H }, () => Array(W).fill(null));

function set(x, y, color) {
  const ix = Math.round(x), iy = Math.round(y);
  if (ix >= 0 && ix < W && iy >= 0 && iy < H) grid[iy][ix] = color;
}

// --- Layer radii ---
const R_OUTLINE = 23.5;    // outer edge
const R_SEAWEED_OUT = 21.5;  // seaweed outer (2px outline ring)
const R_SEAWEED_IN = 19.5;   // seaweed inner / rice outer
const R_RICE_IN = 12.5;    // rice inner / filling boundary

// --- Filling definitions (Voronoi seeds) ---
// Each filling has a center point and a "weight" that expands its Voronoi cell
// Positions are pixel coordinates within the 48x48 grid
const fillingSeeds = [
  // Danmuji (top-left, largest) - bright yellow
  { id: 'dan', cx: 17.5, cy: 17.5, weight: 1.3,
    hi: COL.danHi, base: COL.danBase, sh: COL.danSh },
  // Egg (top-right) - golden yellow
  { id: 'egg', cx: 27.5, cy: 16.5, weight: 1.1,
    hi: COL.eggHi, base: COL.eggBase, sh: COL.eggSh },
  // Ham (center-right) - pink
  { id: 'ham', cx: 28.5, cy: 24, weight: 1.05,
    hi: COL.hamHi, base: COL.hamBase, sh: COL.hamSh },
  // Crab stick (center-left) - salmon
  { id: 'crb', cx: 17, cy: 23, weight: 0.9,
    hi: COL.crbHi, base: COL.crbBase, sh: COL.crbSh },
  // Burdock (small, near center) - brown
  { id: 'bur', cx: 23, cy: 22, weight: 0.7,
    hi: COL.burHi, base: COL.burBase, sh: COL.burSh },
  // Spinach (bottom-left) - dark green
  { id: 'spi', cx: 18, cy: 29, weight: 1.1,
    hi: COL.spiHi, base: COL.spiBase, sh: COL.spiSh },
  // Carrot (bottom-center) - orange
  { id: 'car', cx: 24, cy: 30, weight: 0.95,
    hi: COL.carHi, base: COL.carBase, sh: COL.carSh },
  // Extra egg strip (bottom-right, to fill out)
  { id: 'egg2', cx: 29, cy: 29, weight: 0.85,
    hi: COL.eggHi, base: COL.eggBase, sh: COL.eggSh },
];

// --- Build the kimbap ---
// Track which filling each pixel belongs to for boundary detection
const fillingMap = Array.from({ length: H }, () => Array(W).fill(null));

for (let y = 0; y < H; y++) {
  for (let x = 0; x < W; x++) {
    const d = dist(x, y, cx, cy);

    // Skip pixels outside the kimbap
    if (d > R_OUTLINE) continue;

    // 1. Outer outline
    if (d > R_SEAWEED_OUT) {
      set(x, y, COL.outline);
      continue;
    }

    // 2. Seaweed ring
    if (d > R_SEAWEED_IN) {
      set(x, y, shade3(x, y, cx, cy, COL.seaweedHi, COL.seaweedBase, COL.seaweedSh));
      continue;
    }

    // 3. Rice ring
    if (d > R_RICE_IN) {
      set(x, y, shade3(x, y, cx, cy, COL.riceHi, COL.riceBase, COL.riceSh));

      continue;
    }

    // 4. Fillings center (Voronoi assignment)
    let bestId = null, bestDist = Infinity, bestSeed = null;
    for (const s of fillingSeeds) {
      const fd = dist(x, y, s.cx, s.cy) / s.weight;
      if (fd < bestDist) {
        bestDist = fd;
        bestId = s.id;
        bestSeed = s;
      }
    }

    if (bestSeed) {
      fillingMap[y][x] = bestId;
      set(x, y, shade3(x, y, bestSeed.cx, bestSeed.cy,
                        bestSeed.hi, bestSeed.base, bestSeed.sh));
    }
  }
}

// No separator lines — clean color blocks only

// ==========================================
// RENDER
// ==========================================
function renderToElement(elementId, pixelSize) {
  const shadows = [];
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (grid[y][x]) {
        shadows.push(`${x * pixelSize}px ${y * pixelSize}px 0 ${grid[y][x]}`);
      }
    }
  }
  const el = document.getElementById(elementId);
  if (el) {
    el.style.boxShadow = shadows.join(',');
    el.style.width = pixelSize + 'px';
    el.style.height = pixelSize + 'px';
  }
  return shadows.length;
}

const count = renderToElement('main-canvas', 6);
renderToElement('large-canvas', 12);
renderToElement('small-canvas', 2);

console.log(`Kimbap rendered: ${count} pixels on ${W}x${H} grid`);
</script>

</body>
</html>
